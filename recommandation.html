<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommandation - Collection Robin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-zone {
            margin-top: 3rem;
            border-top: 2px solid #eee;
            padding-top: 2rem;
            display: none;
        }
        .admin-zone.visible {
            display: block;
        }
        .admin-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }
        .admin-controls select {
            padding: 0.8rem;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 1rem;
            width: 100%;
        }
        .admin-controls select:focus {
            outline: none;
            border-color: #FF6B35;
        }
        .admin-controls .save-btn {
            padding: 0.8rem 2rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .admin-controls .save-btn:hover {
            background: #45a049;
        }
        .admin-badge {
            display: inline-block;
            background: #FF6B35;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="index.html">🏠 Accueil</a>
        <a href="artistes.html">🎤 Artistes</a>
        <a href="classement.html">🏆 Classement</a>
        <a href="recommandation.html" class="active">⭐ Recommandation</a>
        <button id="authBtn" class="auth-btn">🔑 Connexion</button>
    </nav>
    <main>
        <h1>⭐ Recommandation du jour</h1>
        <div id="recommandationContainer"></div>
        
        <div id="adminZone" class="admin-zone">
            <h2>👑 Admin <span class="admin-badge">Administrateur</span></h2>
            <p style="color:#888;margin-bottom:1rem;">Définissez l'album recommandé du jour</p>
            <div class="admin-controls">
                <select id="albumSelect">
                    <option value="">Choisir un album...</option>
                </select>
                <button id="setRecommandationBtn" class="save-btn">⭐ Définir comme recommandation</button>
            </div>
        </div>
    </main>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
