        * { margin: 0; padding: 0; box-sizing: border-box; }

            min-height: 100vh;

        .header {
            background: #2a2a2a;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .header a:hover { background: #3a3a3a; }
        main { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .back-btn {

            margin-bottom: 2rem;
            color: #FF6B35;
            text-decoration: none;
            font-size: 1rem;
        }
        .back-btn:hover { text-decoration: underline; }
        .album-header {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #333;
        }
        .album-cover {
            max-width: 200px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            background: #1a1a1a;
            border: 1px solid #444;
        }
        .album-info { flex: 1; min-width: 200px; }
        .album-info h1 { font-size: 2.2rem; font-weight: 300; margin-bottom: 0.3rem; }
        .album-info .artiste { font-size: 1.3rem; color: #888; margin-bottom: 0.3rem; }
        .album-info .annee { color: #666; font-size: 1rem; }
        .pistes-section {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid #333;
        }
        .pistes-section h2 {
            font-weight: 300;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #FF6B35;
        }
        .pistes-list { list-style: none; padding: 0; }
        .pistes-list li {
            padding: 0.8rem 0;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 1.1rem;
        }
        .pistes-list li:last-child { border-bottom: none; }
        .piste-number { color: #666; min-width: 2.5rem; font-weight: 600; }
        .piste-name { color: #ddd; }
        .empty { text-align: center; padding: 3rem; color: #666; font-size: 1.2rem; }
        @media (max-width: 768px) {
            .album-header { flex-direction: column; align-items: center; text-align: center; padding: 1.5rem; }
            .album-cover { max-width: 150px; }
            .album-info h1 { font-size: 1.8rem; }
            .pistes-list li { font-size: 1rem; }
        }
    </style>

        function chargerAlbum() {
            var container = document.getElementById('albumContainer');
            var params = new URLSearchParams(window.location.search);
            var key = params.get('key');
            
            if (!key) {
                container.innerHTML = '<div class="empty">Album non trouvé</div>';
                return;
            }
            
            var album = null;
            for (var i = 0; i < allAlbums.length; i++) {
                var a = allAlbums[i];
                var albumKey = a.artiste + ' - ' + a.album;
                if (albumKey === key) {
                    album = a;
                    break;
                }
            }
            
            if (!album) {
                container.innerHTML = '<div class="empty">Album non trouvé</div>';
                return;
            }
            
            var imgSrc = album.image || '';
            
            var pistesHtml = '';
            if (album.pistes && album.pistes.length > 0) {
                pistesHtml = '<div class="pistes-section">';
                pistesHtml += '<h2>🎵 Pistes</h2>';
                pistesHtml += '<ul class="pistes-list">';
                for (var j = 0; j < album.pistes.length; j++) {
                    var piste = album.pistes[j];
                    if (typeof piste === 'string') {
                        pistesHtml += '<li><span class="piste-number">' + (j + 1) + '.</span><span class="piste-name">' + piste + '</span></li>';
                    }
                }
                pistesHtml += '</ul></div>';
            } else {
                pistesHtml = '<div class="empty">Aucune piste disponible</div>';
            }
            
            container.innerHTML = 
                '<div class="album-header">' +
                    '<img src="' + imgSrc + '" alt="' + album.album + '" class="album-cover" onerror="this.src=\'data:image/svg+xml,%253Csvg xmlns=%2522http://www.w3.org/2000/svg%2522 width=%2522200%2522 height=%2522200%2522%253E%253Crect width=%2522200%2522 height=%2522200%2522 fill=%2522%25231a1a1a%2522/%253E%253Ctext x=%252250%2525%2522 y=%252250%2525%2522 text-anchor=%2522middle%2522 dy=%2522.3em%2522 fill=%2522%2523444%2522 font-size=%252270%2522%253E%25F0%259F%258E%25B5%253C/text%253E%253C/svg%253E\'">' +
                    '<div class="album-info">' +
                        '<h1>' + album.album + '</h1>' +
                        '<div class="artiste">' + album.artiste + '</div>' +
                        '<div class="annee">' + (album.annee || 'Année inconnue') + '</div>' +
                    '</div>' +
                '</div>' +
                pistesHtml;
        }
        
        document.addEventListener('DOMContentLoaded', chargerAlbum);
