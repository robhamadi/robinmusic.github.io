<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Album - Ma Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="back-link">← Retour</a>
            <h1 id="album-title">Album</h1>
        </div>
    </header>

    <main id="album-detail">
        <div class="album-detail-container">
            <div class="album-cover-large">
                <img id="detail-image" src="" alt="Pochette">
            </div>
            <div class="album-info">
                <h2 id="detail-artiste"></h2>
                <p class="detail-annee" id="detail-annee"></p>
                <p class="detail-album" id="detail-album"></p>
                <p class="detail-pistes" id="detail-pistes"></p>
                <div class="detail-rating">
                    <span>⭐ Note: </span>
                    <span id="detail-note">Non noté</span>
                </div>
                <div class="detail-commentaire">
                    <span>💬 </span>
                    <span id="detail-commentaire">Aucun commentaire</span>
                </div>
                <div class="detail-pistes-list">
                    <h3>Pistes</h3>
                    <ul id="detail-pistes-list"></ul>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>🎵 Collection personnelle</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
