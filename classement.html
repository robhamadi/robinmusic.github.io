<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement - Collection Robin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html">🏠 Accueil</a>
        <a href="artistes.html">🎤 Artistes</a>
        <a href="classement.html" class="active">🏆 Classement</a>
        <a href="recommandation.html">⭐ Recommandation</a>
        <button id="authBtn" class="auth-btn">🔑 Connexion</button>
    </nav>
    
    <main>
        <h1>🏆 Classement des albums</h1>
        
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">Tous</button>
            <button class="filter-btn" data-filter="top10">Top 10</button>
            <button class="filter-btn" data-filter="top50">Top 50</button>
        </div>
        
        <div id="classementList" class="classement-list"></div>
    </main>
    
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            chargerClassement('all');
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    chargerClassement(btn.dataset.filter);
                });
            });
        });
    </script>
</body>
</html>
