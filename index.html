<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Musicale de Robin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('Ace Spectrum - 1974 - Inner Spectrum.jpg') center/cover no-repeat;
            z-index: 0;
            filter: brightness(0.5);
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }
        
        h1 {
            color: white;
            font-size: 3.5rem;
            font-weight: 300;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.8);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 3rem;
        }
        
        .btn {
            display: inline-block;
            padding: 1.5rem 4rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            min-width: 300px;
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.6);
        }
        
        .btn .count {
            display: block;
            font-size: 1rem;
            font-weight: 300;
            margin-top: 0.3rem;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .btn {
                font-size: 1.5rem;
                padding: 1.2rem 2rem;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Collection Musicale</h1>
        <p class="subtitle">La discothèque de Robin</p>
        <a href="artistes.html" class="btn">
            🎤 180 Artistes
            <span class="count">Cliquez pour découvrir</span>
        </a>
    </div>
</body>
</html>
